services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: smodu_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smodu_network

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: smodu_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smodu_network

  # ─────────────────────────────────────────
  # Backend Django
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./smodu-backend
      dockerfile: Dockerfile
      target: production
    container_name: smodu_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smodu_network
    expose:
      - "8000"

  # ─────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./smodu-backend
      dockerfile: Dockerfile
      target: production
    container_name: smodu_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l INFO -Q default,notifications
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smodu_network

  # ─────────────────────────────────────────
  # Celery Beat (tâches périodiques)
  # ─────────────────────────────────────────
  celery_beat:
    build:
      context: ./smodu-backend
      dockerfile: Dockerfile
      target: production
    container_name: smodu_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smodu_network

  # ─────────────────────────────────────────
  # Frontend React (build statique servi)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./smodu-frontend
      dockerfile: Dockerfile
      target: production
    container_name: smodu_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - smodu_network
    expose:
      - "80"

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:

networks:
  smodu_network:
    driver: bridge
